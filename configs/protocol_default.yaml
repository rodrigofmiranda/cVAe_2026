# Default reduced protocol for reproducible cVAE evaluation.
#
# This is the minimum scientific grid used in active work:
# 3 distances x 4 currents = 12 regimes.

protocol_version: "1.0"
description: >
  Global train + evaluation over the reduced 12-regime grid:
  3 distances x 4 currents (100, 300, 500, 700 mA).
  Intended as the default minimum protocol before any full 27-regime sweep.

global_settings:
  _selected_experiments:
    - /workspace/2026/feat_seq_bigru_residual_cvae/data/dataset_fullsquare_organized/dist_0.8m/curr_100mA
    - /workspace/2026/feat_seq_bigru_residual_cvae/data/dataset_fullsquare_organized/dist_0.8m/curr_300mA
    - /workspace/2026/feat_seq_bigru_residual_cvae/data/dataset_fullsquare_organized/dist_0.8m/curr_500mA
    - /workspace/2026/feat_seq_bigru_residual_cvae/data/dataset_fullsquare_organized/dist_0.8m/curr_700mA
    - /workspace/2026/feat_seq_bigru_residual_cvae/data/dataset_fullsquare_organized/dist_1.0m/curr_100mA
    - /workspace/2026/feat_seq_bigru_residual_cvae/data/dataset_fullsquare_organized/dist_1.0m/curr_300mA
    - /workspace/2026/feat_seq_bigru_residual_cvae/data/dataset_fullsquare_organized/dist_1.0m/curr_500mA
    - /workspace/2026/feat_seq_bigru_residual_cvae/data/dataset_fullsquare_organized/dist_1.0m/curr_700mA
    - /workspace/2026/feat_seq_bigru_residual_cvae/data/dataset_fullsquare_organized/dist_1.5m/curr_100mA
    - /workspace/2026/feat_seq_bigru_residual_cvae/data/dataset_fullsquare_organized/dist_1.5m/curr_300mA
    - /workspace/2026/feat_seq_bigru_residual_cvae/data/dataset_fullsquare_organized/dist_1.5m/curr_500mA
    - /workspace/2026/feat_seq_bigru_residual_cvae/data/dataset_fullsquare_organized/dist_1.5m/curr_700mA

studies:
  - name: within_regime
    split_strategy: per_experiment
    selectors:
      - distance_m: 0.8
        current_mA: 100
      - distance_m: 0.8
        current_mA: 300
      - distance_m: 0.8
        current_mA: 500
      - distance_m: 0.8
        current_mA: 700
      - distance_m: 1.0
        current_mA: 100
      - distance_m: 1.0
        current_mA: 300
      - distance_m: 1.0
        current_mA: 500
      - distance_m: 1.0
        current_mA: 700
      - distance_m: 1.5
        current_mA: 100
      - distance_m: 1.5
        current_mA: 300
      - distance_m: 1.5
        current_mA: 500
      - distance_m: 1.5
        current_mA: 700
