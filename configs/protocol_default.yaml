# Default protocol configuration for reproducible cVAE evaluation.
#
# A protocol defines one or more *studies*.  Each study has a name,
# a split_strategy, and a list of selectors (operating points).
#
# When the top-level key is ``regimes`` (no ``studies``), the engine
# auto-wraps them into a single "within_regime" study with the
# default per_experiment split — full backward compatibility.
#
# Commit 3X (Phase 4).

studies:
  - name: within_regime
    split_strategy: per_experiment
    selectors:
      - distance_m: 0.8
        current_mA: 200

      - distance_m: 0.8
        current_mA: 800

      - distance_m: 1.5
        current_mA: 200
